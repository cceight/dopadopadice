<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダイスローラー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --text-primary: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --text-accent: #185FA5;
  --text-danger: #A32D2D;
  --surface-0: #f0ede8;
  --surface-1: #f7f5f2;
  --surface-2: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-strong: rgba(0,0,0,0.18);
  --border-danger: #F09595;
  --bg-accent: #E6F1FB;
  --bg-danger: #FCEBEB;
  --radius: 8px;
  --font-sans: system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --text-primary: #e8e6e1;
    --text-secondary: #aaa;
    --text-muted: #666;
    --text-accent: #85B7EB;
    --text-danger: #F09595;
    --surface-0: #111110;
    --surface-1: #1c1c1a;
    --surface-2: #252523;
    --border: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.18);
    --border-danger: #791F1F;
    --bg-accent: #042C53;
    --bg-danger: #501313;
  }
}
body {
  background: var(--surface-0);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem 4rem;
}
#app-wrap { width: 100%; max-width: 600px; }

.dice-label { font-size: 13px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

.dice-face {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 48px;
  text-align: center;
  word-break: break-all;
  line-height: 1.35;
  letter-spacing: 0.04em;
  color: #c0392b;
  -webkit-text-stroke: 2px #d4a017;
  paint-order: stroke fill;
}
.dice-face.rolling {
  color: var(--text-muted);
  -webkit-text-stroke: 0px transparent;
  animation: flicker 0.07s infinite;
}
.dice-face.landed { animation: landPop 0.25s ease-out; }
@keyframes flicker { 0%,100%{opacity:1}50%{opacity:0.35} }
@keyframes landPop {
  0% { transform: scale(1.15); }
  60% { transform: scale(0.97); }
  100% { transform: scale(1); }
}

.current-dice {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: var(--surface-1); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 1.25rem 2rem; width: 100%;
}
.dice-name { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: var(--text-primary); }

.roll-btn {
  font-size: 18px; font-weight: 500; padding: 14px 48px;
  border-radius: var(--radius); cursor: pointer;
  border: 0.5px solid var(--border-strong); background: transparent;
  color: var(--text-primary); transition: background 0.12s, transform 0.08s;
  font-family: var(--font-sans);
}
.roll-btn:hover { background: var(--surface-1); }
.roll-btn:active { transform: scale(0.97); }
.roll-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

.stats-row { display: flex; gap: 12px; width: 100%; }
.stat-card {
  flex: 1; background: var(--surface-1); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 4px;
}
.stat-label { font-size: 12px; color: var(--text-muted); }
.stat-value { font-size: 18px; font-weight: 500; color: var(--text-primary); font-family: var(--font-mono); }

.log-area {
  width: 100%; display: flex; flex-direction: column;
  gap: 4px; max-height: 180px; overflow-y: auto;
}
.log-entry {
  font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono);
  padding: 4px 8px; border-radius: 4px; background: var(--surface-1);
  border: 0.5px solid var(--border); display: flex; justify-content: space-between; gap: 8px;
}
.log-entry .log-roll { color: var(--text-primary); font-weight: 500; }
.log-entry .log-effect { color: var(--text-accent); font-size: 11px; align-self: center; white-space: nowrap; }
.log-entry.log-death { border-color: var(--border-danger); }
.log-entry.log-death .log-roll { color: var(--text-danger); }

.multiplier-badge {
  font-size: 12px; padding: 2px 10px; border-radius: 99px;
  background: var(--bg-accent); color: var(--text-accent);
  font-family: var(--font-mono); font-weight: 500;
}

#sparkle-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}

.death-screen {
  width: 100%;
  background: #080808;
  border-radius: 12px;
  border: 0.5px solid #2a2a2a;
  padding: 3rem 2rem 2.5rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
  animation: deathIn 0.35s ease-out;
  position: relative; overflow: hidden;
}
@keyframes deathIn {
  0% { opacity: 0; transform: scale(0.92); }
  65% { transform: scale(1.02); }
  100% { opacity: 1; transform: scale(1); }
}
.death-lines-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.death-kanji {
  font-family: serif; font-size: 220px; line-height: 1;
  color: #b91c1c; -webkit-text-stroke: 3px #7f0000; paint-order: stroke fill;
  animation: deathPulse 1.4s ease-in-out infinite;
  position: relative; z-index: 2;
}
@keyframes deathPulse {
  0%,100% { color: #b91c1c; -webkit-text-stroke-color: #7f0000; }
  50% { color: #ef4444; -webkit-text-stroke-color: #991b1b; }
}
.death-info { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; z-index: 2; }
.death-line { font-family: serif; font-size: 15px; color: #777; letter-spacing: 0.1em; line-height: 1.8; }
.death-line strong { color: #bbb; font-weight: normal; }
.death-reset-btn {
  margin-top: 0.4rem; font-size: 14px; padding: 8px 28px;
  border-radius: var(--radius); cursor: pointer;
  border: 1px solid #3a3a3a; background: transparent;
  color: #666; font-family: var(--font-sans);
  transition: border-color 0.15s, color 0.15s;
  position: relative; z-index: 2;
}
.death-reset-btn:hover { border-color: #777; color: #bbb; }
</style>
</head>
<body>
<div id="app-wrap">
<div id="app" style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;position:relative;">

  <canvas id="sparkle-canvas"></canvas>

  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;">
    <div class="dice-label">現在のダイス</div>
    <div class="current-dice">
      <div class="dice-name" id="dice-name">1d1000000</div>
    </div>
  </div>

  <div id="result-area" style="min-height:90px;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;">
    <div class="dice-label" id="result-label" style="visibility:hidden">出目</div>
    <div class="dice-face" id="result-num" style="visibility:hidden">—</div>
    <div id="result-effects" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:22px;"></div>
  </div>

  <div id="death-container" style="display:none;width:100%;"></div>

  <button class="roll-btn" id="roll-btn" onclick="rollDice()">振る</button>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">総ロール数</div>
      <div class="stat-value" id="stat-rolls">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">現在の面数（桁）</div>
      <div class="stat-value" id="stat-digits">7</div>
    </div>
  </div>

  <div style="width:100%;">
    <div class="dice-label" style="margin-bottom:6px;">直近のロール</div>
    <div class="log-area" id="log-area"></div>
  </div>

</div>
</div>

<script>
let currentFaces = BigInt("1000000");
let totalRolls = 0;
let rolling = false;
let log = [];
let sparkles = [];
let sparkleAnim = null;

const canvas = document.getElementById('sparkle-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const app = document.getElementById('app');
  canvas.width = app.offsetWidth;
  canvas.height = app.offsetHeight;
}

function spawnSparkles() {
  resizeCanvas();
  const resultEl = document.getElementById('result-num');
  const appEl = document.getElementById('app');
  const rect = resultEl.getBoundingClientRect();
  const appRect = appEl.getBoundingClientRect();
  const cx = rect.left - appRect.left + rect.width / 2;
  const cy = rect.top - appRect.top + rect.height / 2;
  sparkles = [];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    const size = 3 + Math.random() * 6;
    const colors = ['#FFD700','#FFC200','#fff8b0','#FFFACD','#FFB300','#ff6b6b','#ff4757'];
    sparkles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      alpha: 1, size,
      color: colors[Math.floor(Math.random() * colors.length)],
      star: Math.random() > 0.4,
      decay: 0.018 + Math.random() * 0.015,
      life: 1,
    });
  }
  if (sparkleAnim) cancelAnimationFrame(sparkleAnim);
  animateSparkles();
}

function drawStar(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerA = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const innerA = outerA + (2 * Math.PI) / 10;
    if (i === 0) ctx.moveTo(x + r * Math.cos(outerA), y + r * Math.sin(outerA));
    else ctx.lineTo(x + r * Math.cos(outerA), y + r * Math.sin(outerA));
    ctx.lineTo(x + (r * 0.4) * Math.cos(innerA), y + (r * 0.4) * Math.sin(innerA));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function animateSparkles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const s of sparkles) {
    if (s.life <= 0) continue;
    alive = true;
    s.x += s.vx; s.y += s.vy; s.vy += 0.12; s.life -= s.decay;
    if (s.star) drawStar(ctx, s.x, s.y, s.size, s.color, Math.max(0, s.life));
    else {
      ctx.save();
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  if (alive) sparkleAnim = requestAnimationFrame(animateSparkles);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function bigIntRandom(n) {
  const bits = n.toString(2).length;
  const bytes = Math.ceil(bits / 8);
  while (true) {
    const arr = new Uint8Array(bytes);
    crypto.getRandomValues(arr);
    let val = BigInt(0);
    for (let b of arr) val = (val << BigInt(8)) | BigInt(b);
    val = val & ((BigInt(1) << BigInt(bits)) - BigInt(1));
    if (val < n) return val + BigInt(1);
  }
}

function rollDice() {
  if (rolling) return;
  rolling = true;
  document.getElementById('roll-btn').disabled = true;
  document.getElementById('death-container').style.display = 'none';
  const labelEl = document.getElementById('result-label');
  const el = document.getElementById('result-num');
  labelEl.style.visibility = 'visible';
  el.style.visibility = 'visible';
  el.classList.remove('landed');
  el.classList.add('rolling');
  document.getElementById('result-effects').innerHTML = '';
  if (sparkleAnim) { cancelAnimationFrame(sparkleAnim); ctx.clearRect(0,0,canvas.width,canvas.height); }

  let ticks = 0;
  const interval = setInterval(() => {
    el.textContent = bigIntRandom(currentFaces).toString();
    ticks++;
    if (ticks >= 18) {
      clearInterval(interval);
      el.classList.remove('rolling');
      const result = bigIntRandom(currentFaces);
      el.textContent = result.toString();
      void el.offsetWidth;
      el.classList.add('landed');
      processResult(result);
      rolling = false;
      document.getElementById('roll-btn').disabled = false;
    }
  }, 40);
}

function processResult(result) {
  const str = result.toString();
  const digits = str.split('').map(Number);
  totalRolls++;
  document.getElementById('stat-rolls').textContent = totalRolls;

  const zeroOneCount = digits.filter(d => d === 0 || d === 1).length;
  const isDeath = zeroOneCount >= 3;

  const freq = {};
  for (const d of digits) {
    if (d !== 0 && d !== 1) freq[d] = (freq[d] || 0) + 1;
  }

  let multiplier = BigInt(1);
  const effects = [];
  for (const [digit, count] of Object.entries(freq)) {
    if (count >= 2) {
      const d = parseInt(digit);
      const m = BigInt(d) ** BigInt(count);
      multiplier *= m;
      effects.push(`${d}が${count}個 → ×${m.toString()}`);
    }
  }

  const effectsEl = document.getElementById('result-effects');
  if (isDeath) {
    const badge = document.createElement('span');
    badge.className = 'multiplier-badge';
    badge.style.background = 'var(--bg-danger)';
    badge.style.color = 'var(--text-danger)';
    badge.textContent = `0か1が${zeroOneCount}個`;
    effectsEl.appendChild(badge);
  } else {
    for (const e of effects) {
      const badge = document.createElement('span');
      badge.className = 'multiplier-badge';
      badge.textContent = e;
      effectsEl.appendChild(badge);
    }
    setTimeout(spawnSparkles, 50);
  }

  let logEffect = '';
  if (!isDeath && multiplier > BigInt(1)) {
    const newFaces = currentFaces * multiplier;
    logEffect = `×${multiplier.toString()} → 1d${newFaces.toString()}`;
    currentFaces = newFaces;
    updateDiceDisplay();
  }

  addLog(str, logEffect, isDeath);
  if (isDeath) setTimeout(() => showDeath(zeroOneCount, str), 320);
}

function updateDiceDisplay() {
  const s = currentFaces.toString();
  document.getElementById('dice-name').textContent = '1d' + s;
  document.getElementById('stat-digits').textContent = s.length;
}

function addLog(roll, effect, isDeath) {
  const diceName = '1d' + currentFaces.toString();
  log.unshift({ dice: diceName, roll, effect, isDeath });
  if (log.length > 30) log.pop();
  renderLog();
}

function renderLog() {
  const area = document.getElementById('log-area');
  area.innerHTML = '';
  for (const entry of log) {
    const div = document.createElement('div');
    div.className = 'log-entry' + (entry.isDeath ? ' log-death' : '');
    const left = document.createElement('span');
    left.className = 'log-roll';
    left.textContent = (entry.isDeath ? '+ ' : '') + entry.dice + ' → ' + entry.roll;
    div.appendChild(left);
    if (entry.effect) {
      const eff = document.createElement('span');
      eff.className = 'log-effect';
      eff.textContent = entry.effect;
      div.appendChild(eff);
    }
    area.appendChild(div);
  }
}

function drawDeathLines() {
  const lines = [];
  const cx = 280, cy = 200;
  for (let i = 0; i < 28; i++) {
    const angle = (i / 28) * Math.PI * 2;
    const x2 = cx + Math.cos(angle) * 320;
    const y2 = cy + Math.sin(angle) * 320;
    const w = (0.5 + Math.random() * 1.5).toFixed(2);
    const op = (0.3 + Math.random() * 0.5).toFixed(2);
    lines.push(`<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#1a0000" stroke-width="${w}" opacity="${op}"/>`);
  }
  return lines.join('');
}

function showDeath(count, resultStr) {
  const container = document.getElementById('death-container');
  container.innerHTML = '';
  const screen = document.createElement('div');
  screen.className = 'death-screen';
  const linesSvg = `<svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg">${drawDeathLines()}</svg>`;
  screen.innerHTML = `
    <div class="death-lines-bg">${linesSvg}</div>
    <div class="death-kanji">死</div>
    <div class="death-info">
      <div class="death-line">出目 <strong>${resultStr}</strong></div>
      <div class="death-line">0か1が <strong>${count}個</strong> 出現</div>
      <div class="death-line" style="color:#3a3a3a;font-size:13px;">ダイスは初期状態に戻る</div>
    </div>
    <button class="death-reset-btn" onclick="dismissDeath()">再起</button>
  `;
  container.appendChild(screen);
  container.style.display = 'block';
}

function dismissDeath() {
  document.getElementById('death-container').style.display = 'none';
  currentFaces = BigInt("1000000");
  updateDiceDisplay();
  document.getElementById('result-num').style.visibility = 'hidden';
  document.getElementById('result-label').style.visibility = 'hidden';
  document.getElementById('result-effects').innerHTML = '';
  log = [];
  renderLog();
}
</script>
</body>
</html>
